[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[edge_functions]]
  path = "/api/analyze"
  function = "analyze"

[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "*.jsx"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "*.mjs"
  [headers.values]
    Content-Type = "application/javascript"